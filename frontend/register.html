<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Create account — Habit Tracker</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand"><i class="fa-solid fa-bolt"></i> Habit Tracker</div>
    <p class="subtitle">Create an account and start your first streak today.</p>

    <div class="form-error" id="form-error"></div>

    <form id="register-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" minlength="3" maxlength="50" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" maxlength="128" required>
        <span class="field-hint">At least 8 characters.</span>
      </div>
      <div class="field">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" minlength="8" maxlength="128" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-top:0.5rem;">
        <span id="submit-label">Create account</span>
      </button>
    </form>

    <div class="auth-footer">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/reminders.js"></script>
<script>
redirectIfAuthed();

const form = document.getElementById("register-form");
const errorEl = document.getElementById("form-error");
const submitBtn = document.getElementById("submit-btn");
const submitLabel = document.getElementById("submit-label");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  setFormError(errorEl, "");

  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const confirm_password = document.getElementById("confirm_password").value;

  if (password !== confirm_password) {
    setFormError(errorEl, "Passwords do not match.");
    return;
  }

  submitBtn.disabled = true;
  submitLabel.textContent = "Creating account…";

  try {
    const result = await api.post("/auth/register", { username, email, password, confirm_password });
    setToken(result.access_token);
    setCachedUser(result.user);
    location.href = "dashboard.html";
  } catch (err) {
    setFormError(errorEl, err.message || "Registration failed.");
    submitBtn.disabled = false;
    submitLabel.textContent = "Create account";
  }
});
</script>
</body>
</html>
