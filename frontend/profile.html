<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Profile — Habit Tracker</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-shell">
  <div id="app-shell-root"></div>
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Profile</h1>
        <div class="sub">Your account and lifetime stats.</div>
      </div>
    </div>

    <div class="stat-grid" style="grid-template-columns:repeat(2,1fr); margin-bottom:1.75rem;" id="profile-stats">
      <div class="stat-card"><div class="stat-label">Total habits</div><div class="skel" style="height:1.9rem;width:50%;"></div></div>
      <div class="stat-card ember"><div class="stat-label">Total completions</div><div class="skel" style="height:1.9rem;width:50%;"></div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title"><i class="fa-solid fa-user"></i> Account details</div>
        <div class="form-error" id="profile-error"></div>
        <form id="profile-form" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" minlength="3" maxlength="50" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" disabled>
            <span class="field-hint">Email can't be changed here.</span>
          </div>
          <div class="field">
            <label for="avatar_url">Avatar URL <span class="field-hint">(optional)</span></label>
            <input type="text" id="avatar_url" placeholder="https://…">
          </div>
          <button type="submit" class="btn btn-primary" id="profile-submit-btn">
            <span id="profile-submit-label">Save changes</span>
          </button>
        </form>
      </div>

      <div class="card">
        <div class="card-title"><i class="fa-solid fa-lock"></i> Change password</div>
        <div class="form-error" id="password-error"></div>
        <div id="password-success" class="badge badge-streak" style="display:none; margin-bottom:1.1rem;"><i class="fa-solid fa-check"></i> Password updated</div>
        <form id="password-form" novalidate>
          <div class="field">
            <label for="current_password">Current password</label>
            <input type="password" id="current_password" autocomplete="current-password" required>
          </div>
          <div class="field">
            <label for="new_password">New password</label>
            <input type="password" id="new_password" autocomplete="new-password" minlength="8" maxlength="128" required>
            <span class="field-hint">At least 8 characters.</span>
          </div>
          <button type="submit" class="btn btn-secondary" id="password-submit-btn">
            <span id="password-submit-label">Update password</span>
          </button>
        </form>
      </div>
    </div>
  </main>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/reminders.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
