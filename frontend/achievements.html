<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achievements — Habit Tracker</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-shell">
  <div id="app-shell-root"></div>
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Achievements</h1>
        <div class="sub">Unlocked by showing up, not by luck.</div>
      </div>
      <button class="btn btn-secondary" id="recheck-btn"><i class="fa-solid fa-arrows-rotate"></i> Re-check</button>
    </div>

    <div class="achievements-summary">
      <div class="achievements-ring" id="achievements-ring"><span id="ring-label">–</span></div>
      <div>
        <div style="font-weight:700; font-size:1.05rem;" id="summary-count">Loading…</div>
        <div class="sub" style="margin-top:0.15rem;">achievements unlocked</div>
      </div>
    </div>

    <div class="achievements-grid" id="achievements-grid">
      <div class="skel" style="height:100px;"></div>
      <div class="skel" style="height:100px;"></div>
      <div class="skel" style="height:100px;"></div>
      <div class="skel" style="height:100px;"></div>
    </div>
  </main>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/achievements.js"></script>
</body>
</html>
