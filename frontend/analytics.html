<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Habit Tracker</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-shell">
  <div id="app-shell-root"></div>
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Analytics</h1>
        <div class="sub">How your habits are actually going.</div>
      </div>
      <div class="range-toggle" id="range-toggle">
        <button data-days="7">7d</button>
        <button data-days="30" class="active">30d</button>
        <button data-days="90">90d</button>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:1.25rem;">
      <div class="chart-card">
        <div class="card-title"><i class="fa-solid fa-chart-line"></i> Daily completions</div>
        <div class="chart-wrap"><canvas id="daily-chart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="card-title"><i class="fa-solid fa-chart-pie"></i> By category</div>
        <div class="chart-wrap"><canvas id="category-chart"></canvas></div>
      </div>
    </div>

    <div class="chart-card" style="margin-bottom:1.25rem;">
      <div class="card-title"><i class="fa-solid fa-bars-progress"></i> Per-habit completion rate</div>
      <div class="per-habit-list" id="per-habit-list"></div>
    </div>

    <div class="chart-card">
      <div class="page-header" style="margin-bottom:1rem;">
        <div class="card-title" style="margin-bottom:0;"><i class="fa-solid fa-fire"></i> Activity heatmap</div>
        <div class="range-toggle" id="year-toggle"></div>
      </div>
      <div class="heatmap-scroll">
        <div class="heatmap-grid" id="heatmap-grid"></div>
      </div>
      <div class="heatmap-legend">
        Less
        <div class="heatmap-cell" data-level="0"></div>
        <div class="heatmap-cell" data-level="1"></div>
        <div class="heatmap-cell" data-level="2"></div>
        <div class="heatmap-cell" data-level="3"></div>
        <div class="heatmap-cell" data-level="4"></div>
        More
      </div>
    </div>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
