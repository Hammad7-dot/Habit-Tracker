<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Habit Tracker</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-shell">
  <div id="app-shell-root"></div>
  <main class="main">
    <div class="page-header">
      <div>
        <h1 id="greeting">Today</h1>
        <div class="sub" id="today-date"></div>
      </div>
      <a href="habits.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add habit</a>
    </div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-card"><div class="stat-label">Today</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
      <div class="stat-card ember"><div class="stat-label">Current streak</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
      <div class="stat-card"><div class="stat-label">Longest streak</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
      <div class="stat-card"><div class="stat-label">Total habits</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
    </div>

    <div class="card">
      <div class="card-title"><i class="fa-solid fa-list-check"></i> Today's habits</div>
      <div id="habit-list">
        <div class="skel" style="height:60px;margin-bottom:0.5rem;"></div>
        <div class="skel" style="height:60px;margin-bottom:0.5rem;"></div>
        <div class="skel" style="height:60px;"></div>
      </div>
    </div>
  </main>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
