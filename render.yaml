# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys the FastAPI backend as a web service backed by a managed
# PostgreSQL database. In the Render dashboard: New -> Blueprint -> point
# at this repo, and Render reads this file automatically.
#
# DATABASE_URL is wired automatically from the `habit-tracker-db` database
# below via `fromDatabase` — you never paste a connection string by hand.
# SECRET_KEY is auto-generated by Render (`generateValue: true`) the first
# time the service deploys. Migrations run automatically before each
# deploy via `preDeployCommand` below.

services:
  - type: web
    name: habit-tracker-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /
    preDeployCommand: cd backend && alembic upgrade head
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: habit-tracker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: CORS_ORIGINS
        # Replace with your deployed Vercel domain(s) after the frontend is
        # live — comma-separated for multiple (e.g. preview + prod).
        value: https://your-app.vercel.app

databases:
  - name: habit-tracker-db
    plan: free
    databaseName: habit_tracker
    user: habit_tracker
