<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Habit Tracker</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="app-shell">
  <div id="app-shell-root"></div>
  <main class="main">
    <div class="page-header">
      <div>
        <h1 id="greeting">Today</h1>
        <div class="sub" id="today-date"></div>
      </div>
      <a href="habits.html" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add habit</a>
    </div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-card"><div class="stat-label">Today</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
      <div class="stat-card ember"><div class="stat-label">Current streak</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
      <div class="stat-card"><div class="stat-label">Longest streak</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
      <div class="stat-card"><div class="stat-label">Total habits</div><div class="skel" style="height:1.9rem;width:60%;"></div></div>
    </div>

    <div class="card">
      <div class="card-title"><i class="fa-solid fa-list-check"></i> Today's habits</div>
      <div id="habit-list">
        <div class="skel" style="height:60px;margin-bottom:0.5rem;"></div>
        <div class="skel" style="height:60px;margin-bottom:0.5rem;"></div>
        <div class="skel" style="height:60px;"></div>
      </div>
    </div>

    <div class="card" style="margin-top:1.25rem;">
      <div class="page-header" style="margin-bottom:1rem;">
        <div class="card-title" style="margin-bottom:0;"><i class="fa-solid fa-calendar-days"></i> <span id="calendar-month-label">This month</span></div>
        <div class="range-toggle" id="calendar-month-nav">
          <button id="calendar-prev-month" aria-label="Previous month"><i class="fa-solid fa-chevron-left"></i></button>
          <button id="calendar-today-btn">Today</button>
          <button id="calendar-next-month" aria-label="Next month"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
      <div class="month-cal-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="month-cal-grid" id="month-cal-grid"></div>
      <div class="heatmap-legend">
        Less
        <div class="heatmap-cell" data-level="0"></div>
        <div class="heatmap-cell" data-level="1"></div>
        <div class="heatmap-cell" data-level="2"></div>
        <div class="heatmap-cell" data-level="3"></div>
        <div class="heatmap-cell" data-level="4"></div>
        More
      </div>
    </div>
  </main>
</div>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
